# True color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Force zsh (not /bin/sh) for new panes — fixes "0:sh*" status when a session
# was first created without an explicit shell hint.
set -g default-shell /usr/bin/zsh
set -g default-command /usr/bin/zsh

# Keep server alive even with 0 sessions. Prevents the assistant container
# from racing the host: assistant.service's ExecStartPre creates+kills a
# temp session — without exit-empty=off the server died on the kill, then
# the container started its own tmux server inside the docker namespace
# and host shells got /bin/sh from container's filesystem.
set -s exit-empty off

# Base settings
set -g mouse on
set -g escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g set-clipboard on
set -s copy-command 'wl-copy'
setw -g mode-keys vi
set -g pane-border-status off
set -g window-size latest

# Minimal status bar
set -g status-position bottom
set -g status-justify left
set -g status-left-length 20
set -g status-right-length 40
set -g status-left ' #S '
set -g status-right ' %H:%M '
set -g window-status-format ' #I:#W '
set -g window-status-current-format ' #I:#W '
set -g window-status-separator ''

# ── Prefix: Alt+A ────────────────────────────────────────────────────
unbind C-b
set -g prefix M-a
bind M-a send-prefix

# ── Navigation (no prefix) ──────────────────────────────────────────
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Windows (no prefix)
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-c new-window -c "#{pane_current_path}"
bind -n M-x confirm-before -p "kill pane? (y/n)" kill-pane
bind -n M-z resize-pane -Z
bind -n M-d detach-client
bind -n M-F resize-window -A
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Floating popup (scratch session)
bind -n M-f display-popup -w 80% -h 80% -E "tmux new-session -A -s scratch"

# Session picker (no prefix, like Zellij Alt+S)
bind -n M-s display-popup -w 60% -h 60% -E "tmux list-sessions | fzf --reverse | cut -d: -f1 | xargs tmux switch-client -t"

# Help popup with keybinds cheatsheet
bind -n M-'/' display-popup -w 50% -h 70% -E "cat <<'EOF' | less -R
  tmux keybinds cheatsheet

  ── No prefix ──────────────────
  Alt+H/J/K/L   navigate panes
  Alt+N/P       next/prev window
  Alt+1..9      go to window N
  Alt+C         new window
  Alt+X         kill pane
  Alt+Z         zoom (fullscreen)
  Alt+D         detach
  Alt+Shift+F   resize to largest client
  Alt+F         floating popup
  Alt+S         session picker
  Alt+/         this help

  ── Prefix: Alt+A → ... ───────
  v             split right
  s             split down
  [             copy mode (scroll)
  S             session picker
  N             new named session
  ,             rename window
  $             rename session
  r             reload config

  ── Copy mode ─────────────────
  v             begin selection
  V             select line
  y             copy to clipboard
  /             search forward
  ?             search backward
  Escape        exit copy mode

  ── Resurrect ─────────────────
  Alt+A → Ctrl+S   save sessions
  Alt+A → Ctrl+R   restore sessions
EOF
"

# ── Prefix binds ────────────────────────────────────────────────────
# Splits (in current path)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Session management
bind S display-popup -E "tmux list-sessions | fzf --reverse | cut -d: -f1 | xargs tmux switch-client -t"
bind N command-prompt -p "new session:" "new-session -d -s '%1' \; switch-client -t '%1'"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# ── Vi copy mode ────────────────────────────────────────────────────
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy'
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi / command-prompt -i -p "(search down)" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ? command-prompt -i -p "(search up)" "send -X search-backward-incremental \"%%%\""
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'wl-copy'

# ── Auto-hide status when nvim is the active pane ───────────────────
# Primary control is on the nvim side (VimEnter/VimLeavePre autocmds).
# pane-exited is a safety net: fires after nvim's process actually dies,
# so pane_current_command has already flipped back to the shell.
set-hook -g pane-exited "set -g status on"

# ── Theme (overwritten by theme sync) ───────────────────────────────
source-file -q ~/.config/tmux/theme.conf

# ── Session persistence (no TPM) ────────────────────────────────────
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux
run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux
