# Terminal color palette — single source of truth
# Theme: Aurora (semantic Material-inspired)
# Edit this file, then run: theme sync
# When engine=matugen in ~/.config/theme/config, matugen will OVERWRITE this
# on wallpaper change based on current wallpaper's dominant colors.

# Base colors (surface tones)
bg=0f1014
bg_light=181a21
bg_highlight=232631
fg=e6e6f0
fg_dim=a5a9c2
fg_muted=6f7590
border=3a3f52

# Terminal 16 colors — aurora vivid palette
black=232631
bright_black=3a3f52
red=ff6b7a
bright_red=ff8594
green=7be0a7
bright_green=95ebb9
yellow=ffd580
bright_yellow=ffe199
blue=7aa8ff
bright_blue=9abdff
magenta=c99bff
bright_magenta=d6b3ff
cyan=6ee7e7
bright_cyan=8ceded
white=cdd1e4
bright_white=e6e6f0

# Accent (matugen-style semantic roles — used by waybar/swaync/rofi)
accent=7aa8ff
accent_secondary=c99bff
accent_tertiary=7be0a7
error=ff6b7a
warning=ffd580
success=7be0a7
info=6ee7e7

# Cursor + URL
cursor=7aa8ff
url=6ee7e7

# Font
font=JetBrainsMono Nerd Font
