# /* ---- Aurora Theme ---- */
# Glassy, rounded, blurred — mirrors ilyamiro's flat+QML-widget approach
# but using Hyprland's built-in decoration engine instead.

# Aurora colors (regenerated on wallpaper change if matugen is enabled)
source = $HOME/.config/hypr/UserConfigs/aurora-colors.conf

general {
  border_size = 1
  gaps_in = 4
  gaps_out = 10

  # Faint halos border — shadow does the heavy lifting
  col.active_border = rgba(ffffff18)
  col.inactive_border = rgba(ffffff08)
}

decoration {
  rounding = 16
  rounding_power = 3.0

  active_opacity = 0.9
  inactive_opacity = 0.85
  fullscreen_opacity = 1.0

  dim_inactive = false
  dim_strength = 0
  dim_special = 0.4

  blur {
    enabled = true
    size = 8
    passes = 3
    new_optimizations = true
    ignore_opacity = true
    xray = false
    vibrancy = 0.25
    vibrancy_darkness = 0.3
    popups = true
  }

  shadow {
    enabled = true
    range = 40
    render_power = 3
    sharp = false
    ignore_window = true
    color = rgba(00000040)
    color_inactive = rgba(00000020)
    offset = 0 8
    scale = 0.97
  }
}

group {
  col.border_active = rgba(7aa8ffee)

  groupbar {
    col.active = rgba(181a21ff)
  }
}
