# /* ---- Aurora Theme ---- */
# Glassy, rounded, blurred — mirrors ilyamiro's flat+QML-widget approach
# but using Hyprland's built-in decoration engine instead.

# Aurora colors (regenerated on wallpaper change if matugen is enabled)
source = $HOME/.config/hypr/UserConfigs/aurora-colors.conf

general {
  border_size = 2
  gaps_in = 4
  gaps_out = 10

  # Gradient border: aurora accent → secondary
  col.active_border = rgba(7aa8ffff) rgba(c99bffff) 45deg
  col.inactive_border = rgba(3a3f5266)
}

decoration {
  rounding = 12

  active_opacity = 1.0
  inactive_opacity = 0.96
  fullscreen_opacity = 1.0

  dim_inactive = false
  dim_strength = 0

  blur {
    enabled = true
    size = 6
    passes = 2
    new_optimizations = true
    ignore_opacity = true
    xray = false
    vibrancy = 0.12
  }

  shadow {
    enabled = true
    range = 16
    render_power = 3
    color = rgba(0, 0, 0, 0.50)
    offset = 0 2
  }
}

# Layer rules: blur the waybar + swaync background, no anim on OSD
layerrule = blur, waybar
layerrule = blur, swaync-notification-window
layerrule = blur, swaync-control-center
layerrule = ignorealpha 0.2, waybar
layerrule = noanim, selection
