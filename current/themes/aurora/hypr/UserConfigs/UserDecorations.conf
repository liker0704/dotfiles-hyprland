# /* ---- Aurora Theme ---- */
# Glassy, rounded, blurred — mirrors ilyamiro's flat+QML-widget approach
# but using Hyprland's built-in decoration engine instead.

# Aurora colors (regenerated on wallpaper change if matugen is enabled)
source = $HOME/.config/hypr/UserConfigs/aurora-colors.conf

general {
  border_size = 2
  gaps_in = 4
  gaps_out = 10

  # Gradient border: follows palette via aurora-colors.conf
  col.active_border = $accent $accent_secondary 45deg
  col.inactive_border = $border_inactive
}

decoration {
  rounding = 12

  active_opacity = 1.0
  inactive_opacity = 0.96
  fullscreen_opacity = 1.0

  dim_inactive = false
  dim_strength = 0
  dim_special = 0.4

  blur {
    enabled = true
    size = 6
    passes = 2
    new_optimizations = true
    ignore_opacity = true
    xray = false
    vibrancy = 0.12
  }

  shadow {
    enabled = true
    range = 16
    render_power = 3
    color = rgba(00000080)
    color_inactive = rgba(00000040)
    offset = 0 2
  }
}

group {
  col.border_active = rgba(7aa8ffee)

  groupbar {
    col.active = rgba(181a21ff)
  }
}
