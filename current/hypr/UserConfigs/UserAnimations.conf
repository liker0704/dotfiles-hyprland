# /* ---- Aurora animations ---- */
# Fast elastic easing inspired by ilyamiro's myBezier
# (0.05, 0.9, 0.1, 1.05) = quick + slight overshoot

animations {
  enabled = yes

  bezier = auroraEase, 0.05, 0.9, 0.1, 1.05
  bezier = auroraLinear, 0, 0, 1, 1

  # Core windows: pop in at 85% then settle
  animation = windows,      1, 5, auroraEase, popin 85%
  animation = windowsOut,   1, 4, default, popin 90%
  animation = windowsMove,  1, 4, auroraEase

  # Borders: color-shift on focus
  animation = border,       1, 8, default
  animation = borderangle,  1, 6, auroraLinear, loop

  # Layers (waybar, rofi, swaync): fade, don't slide
  animation = layers,       1, 5, auroraEase, fade

  # Workspaces slide smoothly
  animation = workspaces,   1, 4, auroraEase, slide

  # Fade
  animation = fade,         1, 4, default
  animation = fadeDim,      1, 6, default
}
