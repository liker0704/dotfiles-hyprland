# ============================================
# MONOCHROME THEME - NO TRANSPARENCY
# ============================================
# Override all opacity rules from defaults
windowrule = match:class .*, opacity 1.0 override 1.0 override
windowrule = match:title .*, opacity 1.0 override 1.0 override
