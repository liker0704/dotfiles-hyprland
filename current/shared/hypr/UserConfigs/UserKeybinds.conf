# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

#  IMPORTANT: If you want to remap and existing keybind you MUST unbindd it first 

# The bindings are CASE SENSITIVE. We suggest you copy the exisitng binding here
#  Then change `bindd` to `unbind`

# E.g. 
# unbind = $mainMod, Return, Open terminal, exec, $term
# bindd = $mainMod, Return, Open terminal, exec, ghostty 
#
# unbind = $mainMod, E, file manager, exec, $files
# bindd = $mainMod, T, file manager, exec, $files

# If you are ADDING a bindd, make sure you include the description 
# Other the keybind search menu might not show it properly 

# E.g.
# bindd = $mainMod, Z, My z app, exec APPNAME

# App launcher (quickshell native)
unbind = $mainMod, D
bindd = $mainMod, D, app launcher, exec, qs ipc call launcher toggle
bindd = $mainMod, O, app launcher (obsidian menu), exec, qs ipc call launcher obsidianMenu

# VNC/VM passthrough — Super+F12 to toggle.
# When inside 'passthru' submap, every unmapped key (incl. $mainMod combos)
# passes through to the focused VNC/VM window. The F12-toggle binds below
# combine notify + submap change into one exec so Hyprland doesn't drop
# one of two same-key binds (last-bind-wins).
bind = $mainMod, F12, exec, notify-send "VNC Mode" "Key passthru ON — Super+F12 to exit"
bind = $mainMod, F12, submap, passthru
submap = passthru
bind = $mainMod, F12, exec, sh -c 'notify-send "VNC Mode" "Key passthru OFF"; hyprctl dispatch submap reset'
submap = reset

# Voxtype - голосовой ввод (toggle: нажал → запись, нажал ещё раз → стоп + автовставка)
# Super+R - диктовка с автовставкой через wtype
bindd = $mainMod, R, Dictation, exec, ~/.local/bin/voxtype-paste

# ============================================
# VIM KEYBINDINGS (HJKL)
# ============================================

# --- Unbind conflicting keys ---
unbind = $mainMod, H              # was KeyHints.sh
unbind = $mainMod ALT, L          # was ChangeLayout.sh
unbind = $mainMod SHIFT, K        # was KeyBinds.sh
unbind = $mainMod CTRL, K         # was moveintogroup left
unbind = $mainMod CTRL, L         # was moveintogroup right
unbind = $mainMod CTRL, H         # was moveoutofgroup

# --- Reassign moved keybinds ---
bindd = $mainMod, F1, help / cheat sheet, exec, $scriptsDir/KeyHints.sh
bindd = $mainMod SHIFT CTRL, L, toggle master/dwindle layout, exec, $scriptsDir/ChangeLayout.sh
bindd = $mainMod SHIFT CTRL, K, search keybinds, exec, $scriptsDir/KeyBinds.sh

# --- Vim-style focus navigation ---
bindd = $mainMod, H, focus left, movefocus, l
bindd = $mainMod, J, focus down, movefocus, d
bindd = $mainMod, K, focus up, movefocus, u
bindd = $mainMod, L, focus right, movefocus, r

# --- Vim-style move window ---
bindd = $mainMod SHIFT, H, move window left, movewindow, l
bindd = $mainMod SHIFT, J, move window down, movewindow, d
bindd = $mainMod SHIFT, K, move window up, movewindow, u
bindd = $mainMod SHIFT, L, move window right, movewindow, r

# --- Vim-style resize ---
binded = $mainMod CTRL, H, resize left, resizeactive, -50 0
binded = $mainMod CTRL, J, resize down, resizeactive, 0 50
binded = $mainMod CTRL, K, resize up, resizeactive, 0 -50
binded = $mainMod CTRL, L, resize right, resizeactive, 50 0

# --- Vim-style swap ---
bindd = $mainMod ALT, H, swap left, swapwindow, l
bindd = $mainMod ALT, J, swap down, swapwindow, d
bindd = $mainMod ALT, K, swap up, swapwindow, u
bindd = $mainMod ALT, L, swap right, swapwindow, r

# Zen Browser (replace default xdg-open from Keybinds.conf)
unbind = $mainMod, B
bindd = $mainMod, B, Zen Browser, exec, zen-browser

# Focus Mode toggle
bindd = $mainMod, Escape, Toggle Focus Mode, exec, $UserScripts/FocusMode.sh

# Terminal (tmux auto-starts via .zshrc)
unbind = $mainMod, Return
unbind = $mainMod SHIFT, Return
bindd = $mainMod, Return, Open terminal, exec, kitty
bindd = $mainMod SHIFT, Return, Open raw terminal (no tmux), exec, kitty-raw

# Live wallpaper toggle
bindd = $mainMod ALT, W, toggle live wallpaper, exec, $UserScripts/LiveWallpaper.sh


# Session/Power menu
bindd = $mainMod SHIFT, P, Lock screen, exec, hyprlock
