<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- SF Pro Text: use for small UI text (<18pt). Hintslight preserves shape. -->
  <match target="font">
    <test name="family" compare="eq">
      <string>SF Pro Text</string>
    </test>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
    <edit name="autohint" mode="assign"><bool>false</bool></edit>
  </match>

  <!-- SF Pro Display: for large headings. Same rendering settings. -->
  <match target="font">
    <test name="family" compare="eq">
      <string>SF Pro Display</string>
    </test>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
    <edit name="autohint" mode="assign"><bool>false</bool></edit>
  </match>

  <!-- Fallback chain: SF Pro Text → Symbols Nerd Font (icons) → Noto Color Emoji. -->
  <match target="pattern">
    <test name="family"><string>SF Pro Text</string></test>
    <edit name="family" mode="append" binding="weak">
      <string>Symbols Nerd Font</string>
      <string>Noto Color Emoji</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="family"><string>SF Pro Display</string></test>
    <edit name="family" mode="append" binding="weak">
      <string>Symbols Nerd Font</string>
      <string>Noto Color Emoji</string>
    </edit>
  </match>
</fontconfig>
