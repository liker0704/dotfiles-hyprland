# Minimal krb5.conf — no default_realm set.
# Replaces Arch's shipped example config that pointed to ATHENA.MIT.EDU
# (a real MIT kerberos server) as default realm. Apps like FreeRDP's
# SPNEGO would try kerberos auth against MIT and hang/fail, instead of
# falling through to NTLM. Empty config makes kerberos fail fast.
[libdefaults]
    dns_lookup_kdc = false
    dns_lookup_realm = false
