# Terminal color palette — single source of truth
# Theme: Wallpaper (wallust)
# Edit this file, then run: theme sync

# Base colors
bg={{background | strip}}
bg_light={{color0 | strip}}
bg_highlight={{color8 | strip}}
fg={{foreground | strip}}
fg_dim={{color7 | strip}}
fg_muted={{color8 | strip}}
border={{color8 | strip}}

# Terminal 16 colors
black={{color0 | strip}}
bright_black={{color8 | strip}}
red={{color1 | strip}}
bright_red={{color9 | strip}}
green={{color2 | strip}}
bright_green={{color10 | strip}}
yellow={{color3 | strip}}
bright_yellow={{color11 | strip}}
blue={{color4 | strip}}
bright_blue={{color12 | strip}}
magenta={{color5 | strip}}
bright_magenta={{color13 | strip}}
cyan={{color6 | strip}}
bright_cyan={{color14 | strip}}
white={{color7 | strip}}
bright_white={{color15 | strip}}

# Accent
accent={{color4 | strip}}
accent_secondary={{color5 | strip}}
cursor={{foreground | strip}}
url={{color4 | strip}}

# Font
font=JetBrainsMono Nerd Font
